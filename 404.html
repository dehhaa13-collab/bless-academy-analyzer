<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>404 — Сторінку не знайдено | Bless Academy</title>
  <meta name="description" content="Сторінку не знайдено. Повернись на головну Bless Academy AI-аналіз Instagram." />
  <meta name="theme-color" content="#0f0f0f" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Animated gradient background */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, rgba(192,132,252,0.08) 40%, transparent 70%);
      animation: pulse-glow 6s ease-in-out infinite alternate;
    }
    @keyframes pulse-glow {
      0% { opacity: 0.6; transform: translate(-50%, -55%) scale(1); }
      100% { opacity: 1; transform: translate(-50%, -55%) scale(1.15); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    /* Big 404 number */
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #f472b6 0%, #c084fc 50%, #f472b6 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 4s ease infinite;
      margin-bottom: 1rem;
      user-select: none;
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Emoji floating animation */
    .emoji-float {
      font-size: 2.5rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #e4e4e7;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #71717a;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* CTA button */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #f472b6, #c084fc);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(244,114,182,0.25);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(244,114,182,0.35);
    }
    .btn-home:active {
      transform: scale(0.98);
    }

    /* Decorative sparkles */
    .sparkles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(244,114,182,0.4);
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,15,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #2a2a2a;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #f472b6, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .header-badge {
      font-size: 0.65rem;
      color: #a1a1aa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .error-code { font-size: 6rem; }
      h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <a href="/" class="logo">Bless Academy</a>
    <span class="header-badge">AI Аналіз</span>
  </div>

  <!-- Background glow -->
  <div class="bg-glow"></div>

  <!-- Sparkles -->
  <div class="sparkles">
    <div class="sparkle" style="top:12%;left:18%;--dur:3s;--delay:0s"></div>
    <div class="sparkle" style="top:25%;left:72%;--dur:4s;--delay:0.5s"></div>
    <div class="sparkle" style="top:65%;left:85%;--dur:3.5s;--delay:1s"></div>
    <div class="sparkle" style="top:78%;left:22%;--dur:4.5s;--delay:1.5s"></div>
    <div class="sparkle" style="top:40%;left:8%;--dur:3s;--delay:0.8s"></div>
    <div class="sparkle" style="top:55%;left:92%;--dur:3.8s;--delay:0.3s"></div>
    <div class="sparkle" style="top:15%;left:50%;--dur:4.2s;--delay:2s"></div>
    <div class="sparkle" style="top:88%;left:60%;--dur:3.3s;--delay:1.2s"></div>
  </div>

  <!-- Content -->
  <div class="container">
    <div class="error-code">404</div>
    <div class="emoji-float">💅</div>
    <h1>Ой, тут нічого немає</h1>
    <p class="subtitle">
      Схоже, ця сторінка пішла на манікюр і ще не повернулась.<br />
      Повертайся на головну — там все працює!
    </p>
    <a href="/" class="btn-home">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11v10a1 1 0 01-1 1h-3m-4 0v-6a1 1 0 011-1h2a1 1 0 011 1v6" />
      </svg>
      На головну
    </a>
  </div>

</body>
</html>
